name: Build Millsonic Player

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: universal-apple-darwin

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev libssl-dev pkg-config

      - name: Install macOS deps
        if: matrix.os == 'macos-latest'
        run: brew install create-dmg

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm deps
        run: npm install

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@2

      - name: Install create-dmg (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install create-dmg

      - name: Import Apple certificate (macOS)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain login.keychain
          # Import Apple intermediate certificates for full chain
          curl -sL https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer -o DeveloperIDG2CA.cer
          curl -sL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer -o AppleWWDRCAG3.cer
          security import DeveloperIDG2CA.cer -k build.keychain -T /usr/bin/codesign
          security import AppleWWDRCAG3.cer -k build.keychain -T /usr/bin/codesign
          rm DeveloperIDG2CA.cer AppleWWDRCAG3.cer
          security find-identity -v -p codesigning build.keychain
          rm certificate.p12

      - name: Build Tauri app
        run: npx tauri build ${{ matrix.os == 'macos-latest' && '--target universal-apple-darwin' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple code signing & notarization (macOS only)
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: millsonic-player-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: millsonic-player-macos
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.tar.gz.sig

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: millsonic-player-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/millsonic-player-macos/**/*
            artifacts/millsonic-player-windows/**/*
            artifacts/millsonic-player-linux/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate latest.json for updater
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          TAG=$GITHUB_REF_NAME
          BASE="https://github.com/labsFomo/millsonic-player/releases/download/${TAG}"

          # Read signatures
          MAC_SIG=$(cat artifacts/millsonic-player-macos/macos/*.tar.gz.sig 2>/dev/null || echo "")
          WIN_SIG=$(cat artifacts/millsonic-player-windows/nsis/*.nsis.zip.sig 2>/dev/null || echo "")
          LINUX_SIG=$(cat artifacts/millsonic-player-linux/appimage/*.AppImage.sig 2>/dev/null || echo "")

          cat > latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "See https://github.com/labsFomo/millsonic-player/releases/tag/${TAG}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-universal": {
                "url": "${BASE}/Millsonic.Player_${VERSION}_universal.app.tar.gz",
                "signature": "${MAC_SIG}"
              },
              "windows-x86_64": {
                "url": "${BASE}/Millsonic.Player_${VERSION}_x64-setup.nsis.zip",
                "signature": "${WIN_SIG}"
              },
              "linux-x86_64": {
                "url": "${BASE}/Millsonic.Player_${VERSION}_amd64.AppImage",
                "signature": "${LINUX_SIG}"
              }
            }
          }
          ENDJSON
          cat latest.json

      - name: Update latest.json on API server
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          if [ -n "$SSH_KEY" ]; then
            mkdir -p ~/.ssh
            echo "$SSH_KEY" > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
            ssh-keyscan -H 44.213.88.75 >> ~/.ssh/known_hosts 2>/dev/null
            scp latest.json ubuntu@44.213.88.75:/home/ubuntu/millsonic/update-releases/latest.json || echo "SCP failed - update manually"
          else
            echo "No SSH key configured - latest.json needs manual update"
            echo "Content:"
            cat latest.json
          fi
